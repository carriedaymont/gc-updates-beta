# Everyday CI: Linux only, to keep private-repo Actions minutes low.
# Full cross-platform checks (macOS + Windows) live in R-CMD-check-full.yaml,
# which runs on published releases and on manual dispatch.
on:
  push:
    branches: [main, master, efficiency-updates]
  pull_request:

name: R-CMD-check

# Cancel an in-progress run on the same branch when a newer commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    name: ubuntu-latest (${{ matrix.r }})

    strategy:
      fail-fast: false
      matrix:
        r: ["release", "oldrel-1"]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
